name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Spec-compliance check: every skills/<name>/SKILL.md and agents/<name>.md
      # has valid name + description frontmatter (agentskills.io). Mirrors
      # `skills-ref validate`; swap that in here once it's a pinned dependency.
      - name: Validate skills + agents
        run: node scripts/validate-skills.mjs
      # Deterministic, zero-LLM corpus lint: house anatomy sections, README↔directory
      # parity, dead links, description-band + closer outliers. Exit 1 on hard failures.
      # (The router benchmark and smoke gate are LOCAL-ONLY — `claude -p` can't run in
      # CI. See benchmarks/README.md.)
      - name: Skill-health lint
        run: node scripts/skill-health.mjs
